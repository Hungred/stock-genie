name: 配息排程

on:
  schedule:
    # 每天 08:00 台灣時間（UTC 00:00）— 同步 TWSE 除權息資料
    - cron: '0 0 * * 1-5'
    # 每天 08:30 台灣時間（UTC 00:30）— 推播今日提醒
    - cron: '30 0 * * 1-5'
    # 每天 14:30 台灣時間（UTC 06:30）— 除息日自動建立配息記錄
    - cron: '30 6 * * 1-5'
    # 每週一 09:00 台灣時間（UTC 01:00）— 更新股票清單
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      action:
        description: '手動執行哪個動作'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - send-reminders
          - auto-create
          - seed-stocks

jobs:
  sync:
    name: 同步除權息資料
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'sync') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5')
    steps:
      - name: 從 TWSE 抓資料並推送到 API
        run: |
          TODAY=$(date -u +%Y%m%d)
          FUTURE=$(date -u -d '+60 days' +%Y%m%d 2>/dev/null || date -u -v+60d +%Y%m%d)
          URL="https://www.twse.com.tw/rwd/zh/exRight/TWT49U?response=json&strDate=${TODAY}&endDate=${FUTURE}"
          echo "Fetching: $URL"
          DATA=$(curl -sL "$URL" -H "User-Agent: Mozilla/5.0")
          echo "TWSE rows: $(echo $DATA | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("data",[])))')"
          curl -s -X POST "${{ secrets.API_URL }}/api/dividends/sync-data" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d "$DATA" \
            -w "\nHTTP %{http_code}"

  send-reminders:
    name: 推播配息提醒
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'send-reminders') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5')
    steps:
      - name: Call send-reminders API
        run: |
          curl -s -X POST "${{ secrets.API_URL }}/api/dividends/send-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}"

  auto-create:
    name: 除息日自動建立配息記錄
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'auto-create') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 6 * * 1-5')
    steps:
      - name: Call auto-create API
        run: |
          curl -s -X POST "${{ secrets.API_URL }}/api/dividends/auto-create" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}"

  seed-stocks:
    name: 更新台股清單
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'seed-stocks') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 1')
    steps:
      - name: 抓 TWSE + TPEx 股票清單並 seed 進 DB
        run: |
          python3 << 'EOF'
          import urllib.request, json
          from html.parser import HTMLParser

          class TableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.rows = []
                  self.current_row = []
                  self.in_td = False
              def handle_starttag(self, tag, attrs):
                  if tag == 'tr': self.current_row = []
                  if tag == 'td': self.in_td = True
              def handle_endtag(self, tag):
                  if tag == 'tr' and self.current_row: self.rows.append(self.current_row[:])
                  if tag == 'td': self.in_td = False
              def handle_data(self, data):
                  if self.in_td: self.current_row.append(data.strip())

          def fetch_stocks(mode, exchange):
              url = f'https://isin.twse.com.tw/isin/C_public.jsp?strMode={mode}'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  html = r.read().decode('big5', errors='ignore')
              p = TableParser()
              p.feed(html)
              stocks = []
              for row in p.rows:
                  if not row or '　' not in row[0]: continue
                  parts = row[0].split('　', 1)
                  code, name = parts[0].strip(), parts[1].strip()
                  if not code.isdigit() and not (code[:4].isdigit()): continue
                  stocks.append({'code': code, 'name': name, 'exchange': exchange})
              return stocks

          stocks = fetch_stocks(2, 'TWSE') + fetch_stocks(4, 'TPEx')
          print(f'Total stocks: {len(stocks)}')

          import os, subprocess
          data = json.dumps(stocks)
          result = subprocess.run([
              'curl', '-s', '-X', 'POST',
              f'{os.environ["API_URL"]}/api/stocks/seed',
              '-H', 'Content-Type: application/json',
              '-H', f'x-cron-secret: {os.environ["CRON_SECRET"]}',
              '-d', data, '-w', '\nHTTP %{http_code}'
          ], capture_output=True, text=True, env=os.environ)
          print(result.stdout)
          EOF
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
